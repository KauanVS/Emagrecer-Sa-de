services:
  - type: web
    name: portal-admin-app
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install --include=dev && npm run build:render
    startCommand: npx prisma db push --accept-data-loss && node dist/server.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
